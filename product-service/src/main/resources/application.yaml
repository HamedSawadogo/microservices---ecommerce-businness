server:
  port: 9090
spring:
  cache:
    type: redis
  datasource:
    url: jdbc:postgresql://localhost:5438/products-db
    username: user
    password: user
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true
        show_sql: true
        jdbc:
          batch_size: 50
        default_batch_fetch_size: 50
        order_updates: 50
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
logging:
  level:
    org.hibernate.sql: DEBUG
    org.hibernate.type.descriptor.sql: TRACE